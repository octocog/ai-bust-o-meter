<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="meter" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00cc00"/>
      <stop offset="25%" stop-color="#88dd00"/>
      <stop offset="50%" stop-color="#ffee00"/>
      <stop offset="72%" stop-color="#ff8800"/>
      <stop offset="100%" stop-color="#ff0000"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000080"/>
      <stop offset="100%" stop-color="#1084d0"/>
    </linearGradient>
  </defs>

  <!-- starfield background -->
  <rect width="1200" height="630" fill="#000044"/>
  <g fill="#ffffff">
    <circle cx="90" cy="70" r="1.6"/><circle cx="240" cy="140" r="1.2"/><circle cx="400" cy="60" r="1.8"/>
    <circle cx="620" cy="110" r="1.3"/><circle cx="820" cy="70" r="1.6"/><circle cx="1010" cy="130" r="1.4"/>
    <circle cx="1130" cy="60" r="1.7"/><circle cx="150" cy="520" r="1.5"/><circle cx="360" cy="560" r="1.2"/>
    <circle cx="560" cy="520" r="1.6"/><circle cx="760" cy="560" r="1.3"/><circle cx="980" cy="520" r="1.7"/>
    <circle cx="1120" cy="560" r="1.4"/><circle cx="60" cy="300" r="1.3"/><circle cx="1150" cy="330" r="1.5"/>
  </g>
  <g fill="#ffff00">
    <circle cx="300" cy="90" r="1.4"/><circle cx="700" cy="150" r="1.2"/><circle cx="1080" cy="90" r="1.5"/>
    <circle cx="470" cy="540" r="1.3"/><circle cx="900" cy="120" r="1.2"/>
  </g>
  <g fill="#00ffff">
    <circle cx="520" cy="80" r="1.6"/><circle cx="200" cy="560" r="1.5"/><circle cx="1050" cy="550" r="1.4"/>
  </g>

  <!-- title -->
  <text x="600" y="118" text-anchor="middle" font-family="Impact, 'Arial Black', sans-serif"
        font-size="82" fill="#ffff00" letter-spacing="1">The A.I. BUST-O-METER</text>
  <text x="600" y="162" text-anchor="middle" font-family="'Comic Sans MS', cursive, sans-serif"
        font-size="26" fill="#ff66ff">~*~ How likely is an A.I. bust in the next 90 DAYS? ~*~</text>

  <!-- LED odometer box (evergreen: live score updates daily on-site) -->
  <g>
    <rect x="330" y="205" width="540" height="150" fill="#000000" stroke="#444444" stroke-width="6"/>
    <text x="600" y="298" text-anchor="middle" font-family="'Courier New', monospace" font-weight="bold"
          font-size="72" fill="#00ff00" letter-spacing="4">?? / 100</text>
    <text x="600" y="336" text-anchor="middle" font-family="'Courier New', monospace"
          font-size="24" fill="#008800">LIVE SCORE UPDATED DAILY</text>
  </g>

  <!-- meter bar (full gradient, no fixed needle) -->
  <g>
    <rect x="150" y="392" width="900" height="34" fill="url(#meter)" stroke="#808080" stroke-width="3"/>
    <text x="160" y="416" font-family="'Courier New', monospace" font-size="18" fill="#003300" font-weight="bold">0</text>
    <text x="1040" y="416" text-anchor="end" font-family="'Courier New', monospace" font-size="18" fill="#330000" font-weight="bold">100</text>
  </g>

  <!-- band label -->
  <g>
    <rect x="300" y="450" width="600" height="58" fill="#ff8800" stroke="#ffffff" stroke-width="4"/>
    <text x="600" y="490" text-anchor="middle" font-family="Impact, 'Arial Black', sans-serif"
          font-size="32" fill="#000000" letter-spacing="1">HOW CLOSE IS THE A.I. BUST?</text>
  </g>

  <!-- not financial advice ribbon -->
  <g>
    <rect x="330" y="536" width="540" height="42" fill="#330000" stroke="#ff0000" stroke-width="3"/>
    <text x="600" y="565" text-anchor="middle" font-family="Tahoma, sans-serif" font-weight="bold"
          font-size="22" fill="#ff5555">&#9940; ABSOLUTELY NOT FINANCIAL ADVICE &#9940;</text>
  </g>

  <!-- corner tag -->
  <text x="600" y="612" text-anchor="middle" font-family="'Courier New', monospace"
        font-size="16" fill="#ffff00">BEST VIEWED IN NETSCAPE NAVIGATOR 4.0 @ 800x600</text>
</svg>
